# .github/workflows/hotfix-create.yml
# Creates a hotfix/* branch from main and opens a PR.
# Version bump is handled automatically by release-publish.yml when merged.

name: 🚨 Create Hotfix

on:
  workflow_call:
    inputs:
      description:
        description: 'Hotfix description (e.g. fix-auth-token-expiry)'
        required: false
        type: string
        default: ''
      issue-number:
        description: 'Related issue number (optional)'
        required: false
        type: string
        default: ''

jobs:
  create-hotfix:
    name: Create Hotfix
    runs-on: [self-hosted, n100]

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: ⚙️ Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🌿 Create hotfix branch
        id: branch
        run: |
          SLUG=$(echo "${{ inputs.description }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-')
          BRANCH="hotfix/${SLUG}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: 🔀 Create PR
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 hotfix: ${{ inputs.description }}`,
              head: '${{ steps.branch.outputs.branch }}',
              base: 'main',
              body: `## 🚨 Hotfix

**Descripción:** ${{ inputs.description }}
${{ inputs.issue-number && format('\n**Fixes:** #{0}', inputs.issue-number) || '' }}

### Pasos
1. \`git fetch && git checkout ${{ steps.branch.outputs.branch }}\`
2. Implementa el fix usando commits \`fix:\`
3. Push — la PR se actualiza automáticamente
4. Al mergear a main: **patch release creado automáticamente**`
            });
