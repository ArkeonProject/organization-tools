name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Continuous Integration
    uses: ArkeonProject/organization-tools/.github/workflows/ci-python.yml@v1
    with:
      python-version: '3.11'
      use-poetry: false
      run-lint: true
      run-format-check: true
      run-tests: true
      upload-coverage: true
