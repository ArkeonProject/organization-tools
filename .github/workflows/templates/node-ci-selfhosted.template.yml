name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Continuous Integration
    uses: ArkeonProject/organization-tools/.github/workflows/ci-node-selfhosted.yml@v1
    with:
      node-version: '20'
      package-manager: 'pnpm'
      # runner: '["self-hosted", "n100"]'  # default; override if needed
      run-lint: true
      run-typecheck: true
      run-tests: false
      run-build: true
      upload-coverage: false
      upload-artifacts: true
    secrets: inherit
